name: ci

# Pull request + push CI: shellcheck on all shell files, bats tests.
# No untrusted inputs consumed (no github.event.* issue/pr/comment bodies).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + bats + bc
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bats bc

      - name: Run bats tests
        run: bats tests/
